<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal detail form</title>
</head>
<body>
    <h1>Personal detail form</h1>
    <form>
        <fieldset>
            <legend><h2>Fill details</h2></legend>
        <label>Name</label><br>
        <input type="text" id="name"><br><br>
        <label>Email</label><br>
        <input type="text" id="Email"><br><br>
        <label>Password</label><br>
        <input type="password" id="password"><br><br>
        <label>Gender</label><br>
        <input type="radio" id="female" name="gender" value="female">Female<br>
        <input type="radio" id="male" name="gender" value="male">Male<br>
        <label>Favorite country</label><br>
        <input type="checkbox" id="country" value="Spain">Spain<br>
        <input type="checkbox" id="country" value="Korea">Korea<br>
        <label>Date</label><br><br>
        <input type="date"><br><br>
        <input type="submit">
        </fieldset>
    </form>
    
</body>
</html>
